<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background:#f0f2f5; color:#333; }
.container { max-width:1480px; margin:0 auto; padding:20px; }
header { text-align:center; padding:36px 0 18px; }

header p { color:#888; font-size:14px; margin-top:8px; letter-spacing:1px; }

/* Stats bar */
.stats-bar { display:flex; justify-content:center; gap:28px; margin:16px 0 20px; flex-wrap:wrap; }
.stat-item { background:#fff; border-radius:12px; padding:12px 26px; box-shadow:0 1px 6px rgba(0,0,0,.06); text-align:center; min-width:90px; }
.stat-item .num { font-size:24px; font-weight:700; background:linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.stat-item .label { font-size:12px; color:#999; margin-top:2px; }

/* Toolbar */
.toolbar { display:flex; justify-content:center; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
.toolbar button { padding:7px 18px; border:1px solid #ddd; border-radius:20px; background:#fff; cursor:pointer; font-size:13px; transition:all .2s; }
.toolbar button:hover { border-color:#667eea; color:#667eea; }
.toolbar button.active { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border-color:transparent; }

/* Table */
.table-wrap { overflow-x:auto; background:#fff; border-radius:14px; box-shadow:0 2px 16px rgba(0,0,0,.06); }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { position:sticky; top:0; background:#f8f9fc; padding:13px 10px; text-align:left; font-weight:600; font-size:13px; border-bottom:2px solid #eee; white-space:nowrap; z-index:10; }
th .col-edit-btn { display:inline-block; margin-left:4px; cursor:pointer; font-size:12px; opacity:.4; transition:.2s; vertical-align:middle; border:none; background:none; padding:0 2px; }
th .col-edit-btn:hover { opacity:1; }
tbody td { padding:10px; border-bottom:1px solid #f0f0f0; vertical-align:top; }
tbody tr:hover { background:#fafbff; }
tbody tr.row-highlight { background:#eef2ff !important; }

/* Phase header rows */
tr.phase-header td { background:linear-gradient(135deg,#667eea18,#764ba218); font-weight:700; font-size:14px; color:#555; padding:10px 14px; border-bottom:2px solid #e0e0e0; }

a.tpl-link { color:#667eea; text-decoration:none; font-size:12px; display:inline-block; margin:1px 0; }
a.tpl-link:hover { text-decoration:underline; }
a.site-link, a.tool-link { text-decoration:none; font-size:12px; display:inline-block; margin:1px 0; }

a.tool-link { color:#27ae60; }
a.site-link:hover, a.tool-link:hover { text-decoration:underline; }

/* Model badges */
.model-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; margin:1px 2px; color:#fff; text-decoration:none; white-space:nowrap; }
.model-badge:hover { opacity:.85; }
.model-tier-1 { background:linear-gradient(135deg,#f59e0b,#d97706); }
.model-tier-2 { background:#3b82f6; }
.model-tier-3 { background:#9ca3af; }

/* Support material chips */
.support-chip { display:inline-block; background:#f0f2ff; border:1px solid #dde; border-radius:6px; padding:2px 8px; font-size:11px; margin:2px 1px; }
.support-chip a { color:#667eea; text-decoration:none; }
.support-chip a:hover { text-decoration:underline; }

/* More button */
.more-btn { display:inline-block; padding:1px 8px; border:1px solid #ddd; border-radius:10px; font-size:11px; color:#888; cursor:pointer; background:#fafafa; transition:.2s; margin-top:2px; white-space:nowrap; }
.more-btn:hover { border-color:#667eea; color:#667eea; background:#f0f2ff; }

/* Attachment folder icon */
.attach-folder { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:8px; cursor:pointer; font-size:13px; background:#fafafa; border:1px solid #e8e8e8; transition:.2s; position:relative; user-select:none; }
.attach-folder:hover { border-color:#667eea; background:#f0f2ff; }
.attach-folder .badge { display:inline-flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; font-size:10px; font-weight:600; min-width:18px; height:18px; border-radius:9px; padding:0 4px; }

/* Popup (shared for more-items and attachments) */
.popup-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.3); z-index:900; }

.popup-box { position:fixed; background:#fff; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.18); z-index:910; min-width:260px; max-width:400px; max-height:400px; overflow:hidden; display:flex; flex-direction:column; }

.popup-body { padding:12px 16px; overflow-y:auto; flex:1; }

.popup-body .item-card a { color:inherit; text-decoration:none; font-size:12px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.popup-footer { padding:10px 16px; border-top:1px solid #eee; }
.popup-footer .add-row { display:flex; gap:6px; }
.popup-footer input { flex:1; padding:6px 10px; border:1px solid #ddd; border-radius:6px; font-size:12px; }
.popup-footer .add-btn { padding:6px 14px; border:none; border-radius:6px; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; cursor:pointer; font-size:12px; white-space:nowrap; }

/* Column edit modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.45); z-index:1000; justify-content:center; align-items:center; }

.modal-box { background:#fff; border-radius:14px; width:740px; max-width:94vw; max-height:85vh; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,.18); display:flex; flex-direction:column; }

.modal-body { padding:18px 22px; overflow-y:auto; flex:1; }

.modal-item-chips { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
.modal-chip { display:inline-flex; align-items:center; background:#f0f2ff; border:1px solid #dde; border-radius:6px; padding:3px 8px; font-size:11px; color:#555; }
.modal-chip a { color:#667eea; text-decoration:none; margin-right:4px; }

.modal-add-row { display:flex; gap:4px; margin-top:4px; }
.modal-add-row input { padding:4px 8px; border:1px solid #ddd; border-radius:4px; font-size:11px; }

.modal-add-row button { padding:4px 10px; border:none; border-radius:4px; background:#667eea; color:#fff; cursor:pointer; font-size:11px; }
.modal-footer { padding:14px 22px; border-top:1px solid #eee; text-align:right; }
.modal-footer button { padding:8px 24px; border:none; border-radius:8px; cursor:pointer; font-size:13px; margin-left:8px; }
.btn-cancel { background:#f0f0f0; color:#666; }

.btn-save { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; }

/* Toast */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 28px; border-radius:8px; font-size:13px; z-index:2000; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }

/* Drag reorder */
.drag-handle { cursor:grab; color:#bbb; font-size:14px; margin-right:6px; user-select:none; flex-shrink:0; }
.drag-handle:active { cursor:grabbing; }
.item-card[draggable="true"] { transition:background .15s,opacity .15s; }
.item-card.dragging { opacity:.4; background:#e8eaff; }
.item-card.drag-over { border-top:2px solid #667eea; margin-top:-2px; }

/* Popup section title */
.popup-section-title { font-size:11px; color:#999; font-weight:600; padding:8px 0 4px; margin-top:4px; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #f0f0f0; margin-bottom:6px; display:flex; align-items:center; gap:6px; }

/* API config */
.api-config-btn { padding:2px 8px; border:1px solid #e8e8e8; border-radius:4px; font-size:10px; color:#667eea; cursor:pointer; background:#f8f9ff; white-space:nowrap; margin-left:auto; flex-shrink:0; }

/* Popup editable footer */
.popup-footer .add-row { display:flex; gap:6px; flex-wrap:wrap; }
.popup-footer .add-row select { padding:4px 6px; border:1px solid #ddd; border-radius:6px; font-size:11px; }

/* Template editor modal */
.tpl-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.45); z-index:1050; justify-content:center; align-items:center; }

.tpl-header .tpl-actions { display:flex; gap:8px; align-items:center; }
.tpl-body { flex:1; overflow:hidden; display:flex; flex-direction:column; }

.tpl-footer { padding:12px 22px; border-top:1px solid #eee; display:flex; justify-content:space-between; align-items:center; }

</style>
</head>

function getItems(docIdx, col) {
  const ls = localStorage.getItem('aipm_' + col + '_' + docIdx);
  if (ls) return JSON.parse(ls);
  return DOCS[docIdx][col] ? JSON.parse(JSON.stringify(DOCS[docIdx][col])) : [];
}
function saveItems(docIdx, col, items) {
  localStorage.setItem('aipm_' + col + '_' + docIdx, JSON.stringify(items));
}
function getAttachments(docIdx) {
  const raw = localStorage.getItem('aipm_attach_' + docIdx);
  return raw ? JSON.parse(raw) : [];
}
function setAttachments(docIdx, list) {
  localStorage.setItem('aipm_attach_' + docIdx, JSON.stringify(list));
}

}

  localStorage.setItem('aipm_api_' + docIdx + '_' + modelName, JSON.stringify(config));

  const raw = localStorage.getItem('aipm_tpl_' + docIdx);
  return raw ? JSON.parse(raw) : null;
}
function saveTemplateContent(docIdx, content) {
  localStorage.setItem('aipm_tpl_' + docIdx, JSON.stringify(content));
}
function deleteTemplateContent(docIdx) {
  localStorage.removeItem('aipm_tpl_' + docIdx);
}

// ======= Display name (strip prefix numbers) =======
function displayName(name) {
  return name.replace(/^\d{2}_/, '');
}

// ======= Escape HTML =======
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ======= Render =======
function render() {
  const tbody = document.getElementById('docBody');
  let html = '';
  let lastPhase = 0;

  DOCS.forEach((doc, idx) => {
    if (currentPhase !== 'all' && doc.phase !== parseInt(currentPhase)) return;

    if (doc.phase !== lastPhase) {
      lastPhase = doc.phase;
      const p = PHASES.find(pp => pp.id === doc.phase);
      html += '<tr class="phase-header" data-phase="' + doc.phase + '"><td colspan="7">' + p.name + '</td></tr>';
    }

    const rowClass = doc.highlight ? ' class="row-highlight"' : '';
    html += '<tr' + rowClass + ' data-idx="' + idx + '" data-phase="' + doc.phase + '">';

    // Col 1: Name (click opens template editor)
    html += '<td style="font-weight:600"><a class="tpl-link" href="javascript:void(0)" onclick="openTplEditor(' + idx + ')" style="font-size:13px;font-weight:600">' + displayName(doc.name) + '</a></td>';

    // Col 2: Template file (click opens template editor)
    html += '<td><a class="tpl-link" href="javascript:void(0)" onclick="openTplEditor(' + idx + ')">' + displayName(doc.name) + '.md</a></td>';

    // Col 3: Support materials (plain text chips, always "更多")
    html += '<td>' + renderChipList(idx) + '</td>';

    // Col 4: Sites (show 3 + more)
    html += '<td>' + renderLinkList(idx, 'sites', 'site-link') + '</td>';

    // Col 5: Tools (show 3 + more)
    html += '<td>' + renderLinkList(idx, 'tools', 'tool-link') + '</td>';

    // Col 6: Models (show 3 + more)
    html += '<td>' + renderModelList(idx) + '</td>';

    // Col 7: Attachments
    const attachments = getAttachments(idx);
    html += '<td>';
    html += '<div class="attach-folder" onclick="openAttachPopup(event,' + idx + ')">';
    html += '<span style="font-size:16px">\uD83D\uDCC1</span>';
    if (attachments.length > 0) {
      html += '<span class="badge">' + attachments.length + '</span>';
    } else {
      html += '<span style="color:#bbb;font-size:12px">0</span>';
    }
    html += '</div>';
    html += '</td>';

    html += '</tr>';
  });

  tbody.innerHTML = html;
}

// Support docs: plain text (not links), always show "更多"
function renderChipList(docIdx) {
  const items = getItems(docIdx, 'support');
  const show = items.slice(0, 3);
  let html = '';
  show.forEach((s, i) => {
    if (s.url) {
      html += '<span class="support-chip"><a href="javascript:void(0)" onclick="openSupportDoc(' + docIdx + ',' + i + ')" style="color:#667eea;text-decoration:none;cursor:pointer">' + escHtml(s.name) + '</a></span> ';
    } else {
      html += '<span class="support-chip" style="cursor:pointer" onclick="openSupportDoc(' + docIdx + ',' + i + ')">' + escHtml(s.name) + '</span> ';
    }
  });
  const extra = items.length > 3 ? '+' + (items.length - 3) + ' ' : '';
  html += '<span class="more-btn" onclick="openEditablePopup(event,' + docIdx + ',\'support\')">' + extra + '\u66F4\u591A</span>';
  return html;
}

// Sites/Tools: links, 3 + more
function renderLinkList(docIdx, col, linkClass) {
  const items = getItems(docIdx, col);
  const show = items.slice(0, 3);
  let html = '';
  show.forEach(item => {
    html += '<a class="' + linkClass + '" href="' + escHtml(item.url) + '" target="_blank">' + escHtml(item.name) + '</a><br>';
  });
  const extra = items.length > 3 ? '+' + (items.length - 3) + ' ' : '';
  html += '<span class="more-btn" onclick="openEditablePopup(event,' + docIdx + ',\'' + col + '\')">' + extra + '\u66F4\u591A</span>';
  return html;
}

// Models: badges, 3 + more
function renderModelList(docIdx) {
  const models = getItems(docIdx, 'models').slice().sort((a,b) => a.tier - b.tier);
  const show = models.slice(0, 3);
  let html = '';
  show.forEach(m => {
    const tierClass = 'model-tier-' + m.tier;
    const prefix = m.tier === 1 ? '\u2B50 ' : '';
    html += '<a class="model-badge ' + tierClass + '" href="' + escHtml(m.url) + '" target="_blank">' + prefix + escHtml(m.name) + '</a> ';
  });
  const extra = models.length > 3 ? '+' + (models.length - 3) + ' ' : '';
  html += '<span class="more-btn" onclick="openEditablePopup(event,' + docIdx + ',\'models\')">' + extra + '\u66F4\u591A</span>';
  return html;
}

// ======= Phase Filter =======
document.getElementById('toolbar').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON' || !e.target.dataset.phase) return;
  document.querySelectorAll('#toolbar button[data-phase]').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentPhase = e.target.dataset.phase;
  render();
});

// ======= Template Editor =======
async function openTplEditor(docIdx) {
  currentTplIdx = docIdx;
  const doc = DOCS[docIdx];
  document.getElementById('tplTitle').textContent = '\uD83D\uDCDD ' + displayName(doc.name) + '.md';
  const editor = document.getElementById('tplEditor');
  const status = document.getElementById('tplStatus');

  // Check for saved version
  const saved = getTemplateContent(docIdx);
  if (saved) {
    editor.value = saved;
    status.textContent = '\u2705 \u5DF2\u52A0\u8F7D\u7528\u6237\u4FEE\u6539\u7248\u672C';
  } else {
    // Fetch original .md file
    editor.value = '\u52A0\u8F7D\u4E2D...';
    status.textContent = '\u52A0\u8F7D\u539F\u59CB\u6A21\u677F...';
    try {
      const resp = await fetch(doc.tplFile);
      if (resp.ok) {
        editor.value = await resp.text();
        status.textContent = '\u{1F4C4} \u539F\u59CB\u6A21\u677F (\u672A\u4FEE\u6539)';
      } else {
        editor.value = '# ' + displayName(doc.name) + '\n\n\u65E0\u6CD5\u52A0\u8F7D\u6A21\u677F\u6587\u4EF6\uFF0C\u60A8\u53EF\u4EE5\u5728\u6B64\u7F16\u5199\u5185\u5BB9\u3002';
        status.textContent = '\u26A0\uFE0F \u6A21\u677F\u6587\u4EF6\u672A\u627E\u5230\uFF0C\u53EF\u81EA\u7531\u7F16\u5199';
      }
    } catch(e) {
      editor.value = '# ' + displayName(doc.name) + '\n\n\u53EF\u5728\u6B64\u7F16\u5199\u6A21\u677F\u5185\u5BB9\u3002';
      status.textContent = '\u79BB\u7EBF\u6A21\u5F0F\uFF0C\u53EF\u81EA\u7531\u7F16\u5199';
    }
  }
  document.getElementById('tplModal').classList.add('show');
}

async function openSupportDoc(docIdx, itemIdx) {
  const items = getItems(docIdx, 'support');
  const item = items[itemIdx];
  if (!item) return;
  document.getElementById('tplTitle').textContent = '\uD83D\uDCDD ' + item.name;
  const editor = document.getElementById('tplEditor');
  const status = document.getElementById('tplStatus');
  currentTplIdx = 'support_' + docIdx + '_' + itemIdx;

  const saved = localStorage.getItem('aipm_supportdoc_' + docIdx + '_' + itemIdx);
  if (saved) {
    editor.value = JSON.parse(saved);
    status.textContent = '\u2705 \u5DF2\u52A0\u8F7D\u7528\u6237\u4FEE\u6539\u7248\u672C';
  } else if (item.url) {
    editor.value = '\u52A0\u8F7D\u4E2D...';
    status.textContent = '\u52A0\u8F7D\u6A21\u677F...';
    try {
      const resp = await fetch(item.url);
      if (resp.ok) {
        editor.value = await resp.text();
        status.textContent = '\uD83D\uDCC4 \u539F\u59CB\u6A21\u677F (\u672A\u4FEE\u6539)';
      } else {
        editor.value = '# ' + item.name + '\n\n\u53EF\u5728\u6B64\u7F16\u5199\u5185\u5BB9\u3002';
        status.textContent = '\u6A21\u677F\u672A\u627E\u5230\uFF0C\u53EF\u81EA\u7531\u7F16\u5199';
      }
    } catch(e) {
      editor.value = '# ' + item.name + '\n\n\u53EF\u5728\u6B64\u7F16\u5199\u5185\u5BB9\u3002';
      status.textContent = '\u79BB\u7EBF\u6A21\u5F0F';
    }
  } else {
    editor.value = '# ' + item.name + '\n\n\u53EF\u5728\u6B64\u7F16\u5199\u5185\u5BB9\u3002';
    status.textContent = '\u65B0\u6587\u6863';
  }
  document.getElementById('tplModal').classList.add('show');
}

function closeTplModal() {
  document.getElementById('tplModal').classList.remove('show');
  currentTplIdx = null;
}

function saveTemplate() {
  if (currentTplIdx === null) return;
  const content = document.getElementById('tplEditor').value;
  if (typeof currentTplIdx === 'string' && currentTplIdx.startsWith('support_')) {
    localStorage.setItem('aipm_supportdoc_' + currentTplIdx.replace('support_',''), JSON.stringify(content));
  } else {
    saveTemplateContent(currentTplIdx, content);
  }
  document.getElementById('tplStatus').textContent = '\u2705 \u5DF2\u4FDD\u5B58';
  showToast('\u6A21\u677F\u5DF2\u4FDD\u5B58');
}

function resetTemplate() {
  if (currentTplIdx === null) return;
  if (typeof currentTplIdx === 'string' && currentTplIdx.startsWith('support_')) {
    localStorage.removeItem('aipm_supportdoc_' + currentTplIdx.replace('support_',''));
    const parts = currentTplIdx.replace('support_','').split('_');
    openSupportDoc(parseInt(parts[0]), parseInt(parts[1]));
  } else {
    deleteTemplateContent(currentTplIdx);
    openTplEditor(currentTplIdx);
  }
  showToast('\u5DF2\u6062\u590D\u9ED8\u8BA4\u6A21\u677F');
}

function deleteTemplate() {
  if (currentTplIdx === null) return;
  if (!confirm('\u786E\u5B9A\u8981\u5220\u9664\u8FD9\u4E2A\u6A21\u677F\u7684\u81EA\u5B9A\u4E49\u5185\u5BB9\u5417\uFF1F\u5220\u9664\u540E\u5C06\u6062\u590D\u4E3A\u9ED8\u8BA4\u6A21\u677F\u3002')) return;
  deleteTemplateContent(currentTplIdx);
  closeTplModal();
  showToast('\u6A21\u677F\u5DF2\u5220\u9664\uFF0C\u5DF2\u6062\u590D\u9ED8\u8BA4');
}

// Click tpl-modal overlay to close
document.getElementById('tplModal').addEventListener('click', e => {
  if (e.target === document.getElementById('tplModal')) closeTplModal();
});

// ======= Popup System =======
function positionPopup(ev, box) {
  const rect = ev.target.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left;
  if (left + 380 > window.innerWidth) left = window.innerWidth - 400;
  if (left < 10) left = 10;
  if (top + 420 > window.innerHeight) top = rect.top - 420;
  if (top < 10) top = 10;
  box.style.top = top + 'px';
  box.style.left = left + 'px';
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  document.getElementById('popupBox').style.display = 'none';
  popupState = { docIdx:null, col:null };
}

// ======= Unified Editable Popup =======
function openEditablePopup(ev, docIdx, col) {
  ev.stopPropagation();
  popupState = { docIdx, col };
  const items = JSON.parse(JSON.stringify(getItems(docIdx, col)));
  if (col === 'models') items.sort((a,b) => a.tier - b.tier);

  const box = document.getElementById('popupBox');
  box.style.minWidth = col === 'models' ? '340px' : '300px';
  box.style.maxWidth = col === 'models' ? '440px' : '400px';

  let html = '<div class="popup-header"><h4>' + COL_ICONS[col] + ' ' + COL_NAMES[col] + ' - ' + displayName(DOCS[docIdx].name) + '</h4><button class="popup-close" onclick="closePopup()">&times;</button></div>';
  html += '<div class="popup-body" id="editPopupBody">';
  html += renderPopupItems(items, col, docIdx);
  html += '</div>';

  // Add form footer
  html += '<div class="popup-footer">';
  if (col === 'support') {
    // Support docs: name input + file upload
    html += '<div class="add-row" style="margin-bottom:6px">';
    html += '<input id="popupAddName" placeholder="\u6587\u6863\u540D\u79F0" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px">';
    html += '<button class="add-btn" onclick="addPopupItem()">\u6DFB\u52A0</button>';
    html += '</div>';
    html += '<div class="add-row">';
    html += '<input type="file" id="popupSupportFile" style="flex:1;font-size:11px;border:1px solid #ddd;border-radius:6px;padding:4px 8px" onchange="addSupportFile(event)">';
    html += '</div>';
  } else {
    html += '<div class="add-row">';
    html += '<input id="popupAddName" placeholder="\u540D\u79F0" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px">';
    html += '<input id="popupAddUrl" placeholder="URL" style="flex:1.5;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px">';
    if (col === 'models') {
      html += '<select id="popupAddTier" style="padding:6px;border:1px solid #ddd;border-radius:6px;font-size:11px"><option value="1">\u2B50\u6700\u4F73</option><option value="2">\u9002\u7528</option><option value="3">\u5907\u9009</option></select>';
    }
    html += '<button class="add-btn" onclick="addPopupItem()">\u6DFB\u52A0</button>';
    html += '</div>';
  }
  html += '</div>';

  box.innerHTML = html;
  box.style.display = 'flex';
  document.getElementById('popupOverlay').classList.add('show');
  positionPopup(ev, box);
  initDragHandlers();
}

function renderPopupItems(items, col, docIdx) {
  let html = '';
  if (col === 'models') {
    const tiers = [
      { id:1, label:'\u2B50 \u6700\u4F73\u63A8\u8350', color:'#f59e0b' },
      { id:2, label:'\uD83D\uDD35 \u9002\u7528', color:'#3b82f6' },
      { id:3, label:'\u26AA \u5907\u9009', color:'#9ca3af' }
    ];
    tiers.forEach(tier => {
      const tierItems = items.filter(m => m.tier === tier.id);
      if (tierItems.length === 0) return;
      html += '<div class="popup-section-title"><span style="color:' + tier.color + '">\u25CF</span> ' + tier.label + ' (' + tierItems.length + ')</div>';
      tierItems.forEach(item => {
        const realIdx = items.indexOf(item);
        html += renderDragItem(item, realIdx, col, docIdx);
      });
    });
  } else {
    const sectionName = col === 'sites' ? '\u7F51\u7AD9\u5217\u8868' : col === 'tools' ? '\u5DE5\u5177\u5217\u8868' : '\u652F\u6491\u6587\u6863';
    html += '<div class="popup-section-title">' + sectionName + ' (' + items.length + ')</div>';
    items.forEach((item, i) => {
      html += renderDragItem(item, i, col, docIdx);
    });
  }
  return html;
}

function renderDragItem(item, idx, col, docIdx) {
  let html = '<div class="item-card" draggable="true" data-idx="' + idx + '">';
  html += '<span class="drag-handle" title="\u62D6\u62FD\u6392\u5E8F">\u2630</span>';
  if (col === 'support') {
    html += '<span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#555">' + escHtml(item.name) + '</span>';
  } else {
    const domain = item.url && item.url !== '#' ? item.url.replace(/^https?:\/\/(www\.)?/, '').split('/')[0] : '';
    html += '<a href="' + escHtml(item.url) + '" target="_blank" style="color:inherit;text-decoration:none;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(item.name) + '</a>';
    if (domain) html += '<span style="font-size:10px;color:#aaa;margin:0 6px;flex-shrink:0">' + escHtml(domain) + '</span>';
  }
  if (col === 'models') {
    const apiConf = getApiConfig(docIdx, item.name);
    const hasApi = apiConf.apiKey || apiConf.endpoint;
    html += '<button class="api-config-btn" onclick="toggleApiPanel(' + idx + ',event)" style="' + (hasApi ? 'color:#27ae60;border-color:#27ae60' : '') + '">' + (hasApi ? '\u2705 API' : '\u2699\uFE0F API') + '</button>';
  }
  html += '<button class="del-btn" onclick="removePopupItem(' + idx + ',event)" title="\u5220\u9664">&times;</button>';
  html += '</div>';
  if (col === 'models') {
    html += '<div class="api-config-panel" id="apiPanel_' + idx + '" style="display:none">';
    const apiConf = getApiConfig(docIdx, item.name);
    html += '<label>API Key</label><input id="apiKey_' + idx + '" value="' + escHtml(apiConf.apiKey) + '" placeholder="\u8F93\u5165API Key...">';
    html += '<label>API Endpoint</label><input id="apiEndpoint_' + idx + '" value="' + escHtml(apiConf.endpoint) + '" placeholder="https://api.example.com/v1">';
    html += '<button class="api-save-btn" onclick="saveApiConfigFromPopup(' + idx + ',event)">\u4FDD\u5B58\u914D\u7F6E</button>';
    html += '</div>';
  }
  return html;
}

function toggleApiPanel(idx, ev) {
  ev.stopPropagation();
  const panel = document.getElementById('apiPanel_' + idx);
  if (panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function saveApiConfigFromPopup(idx, ev) {
  ev.stopPropagation();
  const { docIdx, col } = popupState;
  const items = JSON.parse(JSON.stringify(getItems(docIdx, col)));
  if (col === 'models') items.sort((a,b) => a.tier - b.tier);
  const item = items[idx];
  if (!item) return;
  const apiKey = document.getElementById('apiKey_' + idx).value.trim();
  const endpoint = document.getElementById('apiEndpoint_' + idx).value.trim();
  setApiConfig(docIdx, item.name, { apiKey, endpoint });
  showToast('API\u914D\u7F6E\u5DF2\u4FDD\u5B58: ' + item.name);
  const panel = document.getElementById('apiPanel_' + idx);
  if (panel) panel.style.display = 'none';
  refreshPopupBody();
}

function removePopupItem(idx, ev) {
  ev.stopPropagation();
  const { docIdx, col } = popupState;
  const items = JSON.parse(JSON.stringify(getItems(docIdx, col)));
  if (col === 'models') items.sort((a,b) => a.tier - b.tier);
  items.splice(idx, 1);
  saveItems(docIdx, col, items);
  render();
  refreshPopupBody();
  showToast('\u5DF2\u5220\u9664');
}

function addPopupItem() {
  const { docIdx, col } = popupState;
  const nameInput = document.getElementById('popupAddName');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }

  const items = JSON.parse(JSON.stringify(getItems(docIdx, col)));
  const item = { name };
  if (col === 'support') {
    item.url = '';
  } else {
    const urlInput = document.getElementById('popupAddUrl');
    item.url = urlInput.value.trim() || '#';
    urlInput.value = '';
  }
  if (col === 'models') {
    const tierSelect = document.getElementById('popupAddTier');
    item.tier = parseInt(tierSelect.value);
  }
  items.push(item);
  saveItems(docIdx, col, items);
  nameInput.value = '';
  render();
  refreshPopupBody();
  showToast('\u5DF2\u6DFB\u52A0: ' + name);
}

function addSupportFile(ev) {
  const files = ev.target.files;
  if (!files.length) return;
  const { docIdx, col } = popupState;
  if (col !== 'support') return;
  const items = JSON.parse(JSON.stringify(getItems(docIdx, col)));
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    const name = f.name.replace(/\.[^.]+$/, '');
    items.push({ name: name, url: '', fileName: f.name });
  }
  saveItems(docIdx, col, items);
  ev.target.value = '';
  render();
  refreshPopupBody();
  showToast('\u6587\u6863\u5DF2\u6DFB\u52A0');
}

function refreshPopupBody() {
  const { docIdx, col } = popupState;
  if (docIdx === null) return;
  const body = document.getElementById('editPopupBody');
  if (!body) return;
  const items = JSON.parse(JSON.stringify(getItems(docIdx, col)));
  if (col === 'models') items.sort((a,b) => a.tier - b.tier);
  body.innerHTML = renderPopupItems(items, col, docIdx);
  initDragHandlers();
}

// ======= Drag & Drop =======
function initDragHandlers() {
  const body = document.getElementById('editPopupBody');
  if (!body) return;
  const cards = body.querySelectorAll('.item-card[draggable]');
  cards.forEach(card => {
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragover', onDragOver);
    card.addEventListener('dragleave', onDragLeave);
    card.addEventListener('drop', onDrop);
    card.addEventListener('dragend', onDragEnd);
  });
}
function onDragStart(e) {
  dragState.fromIdx = parseInt(e.currentTarget.dataset.idx);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const toIdx = parseInt(e.currentTarget.dataset.idx);
  const fromIdx = dragState.fromIdx;
  if (fromIdx === toIdx || fromIdx === null) return;
  const { docIdx, col } = popupState;
  const items = JSON.parse(JSON.stringify(getItems(docIdx, col)));
  if (col === 'models') items.sort((a,b) => a.tier - b.tier);
  const [moved] = items.splice(fromIdx, 1);
  items.splice(toIdx, 0, moved);
  saveItems(docIdx, col, items);
  render();
  refreshPopupBody();
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  dragState.fromIdx = null;
  document.querySelectorAll('.item-card.drag-over').forEach(el => el.classList.remove('drag-over'));
}

// ======= Attachment Popup =======
function openAttachPopup(ev, docIdx) {
  ev.stopPropagation();
  popupState = { docIdx, col:'attach' };
  const attachments = getAttachments(docIdx);

  const box = document.getElementById('popupBox');
  let html = '<div class="popup-header"><h4>\uD83D\uDCC1 \u9644\u4EF6 - ' + displayName(DOCS[docIdx].name) + '</h4><button class="popup-close" onclick="closePopup()">&times;</button></div>';
  html += '<div class="popup-body" id="attachPopupBody">';
  if (attachments.length === 0) {
    html += '<div style="text-align:center;color:#bbb;padding:20px;font-size:13px">\u6682\u65E0\u9644\u4EF6</div>';
  } else {
    attachments.forEach((fn, fi) => {
      html += '<div class="item-card"><a style="color:#555;flex:1;font-size:12px">' + escHtml(fn) + '</a><button class="del-btn" onclick="removeAttachFromPopup(' + docIdx + ',' + fi + ',event)" title="\u5220\u9664">&times;</button></div>';
    });
  }
  html += '</div>';
  html += '<div class="popup-footer"><div class="add-row">';
  html += '<input type="file" id="popupFileInput" multiple style="flex:1;font-size:12px;border:1px solid #ddd;border-radius:6px;padding:4px 8px" onchange="handlePopupFileSelect(event,' + docIdx + ')">';
  html += '</div></div>';

  box.innerHTML = html;
  box.style.display = 'flex';
  document.getElementById('popupOverlay').classList.add('show');
  positionPopup(ev, box);
}

function removeAttachFromPopup(docIdx, fileIdx, ev) {
  ev.stopPropagation();
  const list = getAttachments(docIdx);
  list.splice(fileIdx, 1);
  setAttachments(docIdx, list);
  render();
  const body = document.getElementById('attachPopupBody');
  if (body) {
    let html = '';
    const attachments = getAttachments(docIdx);
    if (attachments.length === 0) {
      html = '<div style="text-align:center;color:#bbb;padding:20px;font-size:13px">\u6682\u65E0\u9644\u4EF6</div>';
    } else {
      attachments.forEach((fn, fi) => {
        html += '<div class="item-card"><a style="color:#555;flex:1;font-size:12px">' + escHtml(fn) + '</a><button class="del-btn" onclick="removeAttachFromPopup(' + docIdx + ',' + fi + ',event)" title="\u5220\u9664">&times;</button></div>';
      });
    }
    body.innerHTML = html;
  }
  showToast('\u9644\u4EF6\u5DF2\u79FB\u9664');
}

function handlePopupFileSelect(ev, docIdx) {
  const files = ev.target.files;
  if (!files.length) return;
  const list = getAttachments(docIdx);
  for (let i = 0; i < files.length; i++) {
    if (!list.includes(files[i].name)) list.push(files[i].name);
  }
  setAttachments(docIdx, list);
  ev.target.value = '';
  render();
  const body = document.getElementById('attachPopupBody');
  if (body) {
    let html = '';
    list.forEach((fn, fi) => {
      html += '<div class="item-card"><a style="color:#555;flex:1;font-size:12px">' + escHtml(fn) + '</a><button class="del-btn" onclick="removeAttachFromPopup(' + docIdx + ',' + fi + ',event)" title="\u5220\u9664">&times;</button></div>';
    });
    body.innerHTML = html;
  }
  showToast('\u9644\u4EF6\u5DF2\u6DFB\u52A0');
}

// ======= Column Edit Modal =======
function openColModal(col) {
  currentEditCol = col;
  document.getElementById('colModalTitle').textContent = '\u7F16\u8F91\u5217: ' + COL_NAMES[col];
  editBuffer = {};
  DOCS.forEach((doc, idx) => {
    editBuffer[idx] = JSON.parse(JSON.stringify(getItems(idx, col)));
  });
  renderModalBody(col);
  document.getElementById('colModal').classList.add('show');
}

function renderModalBody(col) {
  const body = document.getElementById('colModalBody');
  let html = '';
  DOCS.forEach((doc, idx) => {
    const items = editBuffer[idx] || [];
    if (col !== 'models') items.sort((a,b) => a.name.localeCompare(b.name, 'zh-CN'));

    html += '<div class="modal-row">';
    html += '<div class="modal-row-label">' + displayName(doc.name) + '</div>';
    html += '<div class="modal-row-content">';
    html += '<div class="modal-item-chips">';
    items.forEach((item, i) => {
      if (col === 'models') {
        const tierLabel = item.tier === 1 ? '\u2B50\u6700\u63A8\u8350' : item.tier === 2 ? '\u9002\u7528' : '\u5907\u9009';
        html += '<span class="modal-chip"><a href="' + escHtml(item.url || '#') + '" target="_blank">' + escHtml(item.name) + '</a><span style="font-size:10px;color:#999">(' + tierLabel + ')</span><button class="chip-del" onclick="removeModalItem(' + idx + ',' + i + ')">&times;</button></span>';
      } else if (col === 'support') {
        html += '<span class="modal-chip">' + escHtml(item.name) + '<button class="chip-del" onclick="removeModalItem(' + idx + ',' + i + ')">&times;</button></span>';
      } else {
        html += '<span class="modal-chip"><a href="' + escHtml(item.url) + '" target="_blank">' + escHtml(item.name) + '</a><button class="chip-del" onclick="removeModalItem(' + idx + ',' + i + ')">&times;</button></span>';
      }
    });
    html += '</div>';
    html += '<div class="modal-add-row">';
    html += '<input class="name-input" placeholder="\u540D\u79F0" id="addName_' + idx + '">';
    if (col !== 'support') {
      html += '<input class="url-input" placeholder="URL" id="addUrl_' + idx + '">';
    }
    if (col === 'models') {
      html += '<select id="addTier_' + idx + '" style="padding:4px;border:1px solid #ddd;border-radius:4px;font-size:11px"><option value="1">\u2B50\u6700\u63A8\u8350</option><option value="2">\u9002\u7528</option><option value="3">\u5907\u9009</option></select>';
    }
    html += '<button onclick="addModalItem(' + idx + ')">\u6DFB\u52A0</button>';
    html += '</div>';
    html += '</div></div>';
  });
  body.innerHTML = html;
}

function removeModalItem(docIdx, itemIdx) {
  editBuffer[docIdx].splice(itemIdx, 1);
  renderModalBody(currentEditCol);
}

function addModalItem(docIdx) {
  const nameInput = document.getElementById('addName_' + docIdx);
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }
  const item = { name };
  if (currentEditCol === 'support') {
    item.url = '';
  } else {
    const urlInput = document.getElementById('addUrl_' + docIdx);
    item.url = urlInput.value.trim() || '#';
    urlInput.value = '';
  }
  if (currentEditCol === 'models') {
    const tierSelect = document.getElementById('addTier_' + docIdx);
    item.tier = parseInt(tierSelect.value);
  }
  editBuffer[docIdx].push(item);
  nameInput.value = '';
  renderModalBody(currentEditCol);
}

function closeColModal() {
  document.getElementById('colModal').classList.remove('show');
  currentEditCol = null;
  editBuffer = {};
}

function saveColModal() {
  Object.keys(editBuffer).forEach(idx => {
    saveItems(parseInt(idx), currentEditCol, editBuffer[idx]);
  });
  closeColModal();
  render();
  showToast('\u5DF2\u4FDD\u5B58\u66F4\u6539');
}

document.getElementById('colModal').addEventListener('click', e => {
  if (e.target === document.getElementById('colModal')) closeColModal();
});

// ======= Toast =======
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ======= Init =======
// ======= Init =======
render();

</script>
</body>
</html>
