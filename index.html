* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background:#f0f2f5; color:#333; }
.container { max-width:1480px; margin:0 auto; padding:20px; }
header { text-align:center; padding:36px 0 18px; }

header p { color:#888; font-size:14px; margin-top:8px; letter-spacing:1px; }

.stat-item { background:#fff; border-radius:12px; padding:12px 26px; box-shadow:0 1px 6px rgba(0,0,0,.06); text-align:center; min-width:90px; }
.stat-item .num { font-size:24px; font-weight:700; background:linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.stat-item .label { font-size:12px; color:#999; margin-top:2px; }

/* Toolbar */
.toolbar { display:flex; justify-content:center; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
.toolbar button { padding:7px 18px; border:1px solid #ddd; border-radius:20px; background:#fff; cursor:pointer; font-size:13px; transition:all .2s; }
.toolbar button:hover { border-color:#667eea; color:#667eea; }
.toolbar button.active { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border-color:transparent; }

/* Table */
.table-wrap { overflow-x:auto; background:#fff; border-radius:14px; box-shadow:0 2px 16px rgba(0,0,0,.06); }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { position:sticky; top:0; background:#f8f9fc; padding:13px 10px; text-align:left; font-weight:600; font-size:13px; border-bottom:2px solid #eee; white-space:nowrap; z-index:10; }
th .col-edit-btn { display:inline-block; margin-left:4px; cursor:pointer; font-size:12px; opacity:.4; transition:.2s; vertical-align:middle; border:none; background:none; padding:0 2px; }
th .col-edit-btn:hover { opacity:1; }
tbody td { padding:10px; border-bottom:1px solid #f0f0f0; vertical-align:top; }
tbody tr:hover { background:#fafbff; }
tbody tr.row-highlight { background:#eef2ff !important; }

/* Phase header rows */
tr.phase-header td { background:linear-gradient(135deg,#667eea18,#764ba218); font-weight:700; font-size:14px; color:#555; padding:10px 14px; border-bottom:2px solid #e0e0e0; }

/* Links */
a.tpl-link { color:#667eea; text-decoration:none; font-size:12px; display:inline-block; margin:1px 0; }
a.tpl-link:hover { text-decoration:underline; }
a.site-link, a.tool-link { text-decoration:none; font-size:12px; display:inline-block; margin:1px 0; }
a.site-link { color:#e67e22; }
a.tool-link { color:#27ae60; }
a.site-link:hover, a.tool-link:hover { text-decoration:underline; }

/* Model badges */
.model-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; margin:1px 2px; color:#fff; text-decoration:none; white-space:nowrap; }
.model-badge:hover { opacity:.85; }
.model-tier-1 { background:linear-gradient(135deg,#f59e0b,#d97706); }
.model-tier-2 { background:#3b82f6; }
.model-tier-3 { background:#9ca3af; }

/* Support material chips */
.support-chip { display:inline-block; background:#f0f2ff; border:1px solid #dde; border-radius:6px; padding:2px 8px; font-size:11px; margin:2px 1px; }
.support-chip a { color:#667eea; text-decoration:none; }
.support-chip a:hover { text-decoration:underline; }

/* More button */
.more-btn { display:inline-block; padding:1px 8px; border:1px solid #ddd; border-radius:10px; font-size:11px; color:#888; cursor:pointer; background:#fafafa; transition:.2s; margin-top:2px; white-space:nowrap; }
.more-btn:hover { border-color:#667eea; color:#667eea; background:#f0f2ff; }

/* Attachment folder icon */
.attach-folder { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:8px; cursor:pointer; font-size:13px; background:#fafafa; border:1px solid #e8e8e8; transition:.2s; position:relative; user-select:none; }

.attach-folder .badge { display:inline-flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; font-size:10px; font-weight:600; min-width:18px; height:18px; border-radius:9px; padding:0 4px; }

.popup-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.3); z-index:900; }
.popup-overlay.show { display:block; }
.popup-box { position:fixed; background:#fff; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.18); z-index:910; min-width:260px; max-width:400px; max-height:400px; overflow:hidden; display:flex; flex-direction:column; }

/* Toast */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 28px; border-radius:8px; font-size:13px; z-index:2000; opacity:0; transition:opacity .3s; pointer-events:none; }

  thead th, tbody td { padding:8px 6px; }

// Column config
const COL_NAMES = { sites:'数据/报告网站', tools:'推荐工具', models:'推荐模型' };

// ======= State =======
let currentPhase = 'all';
let currentEditCol = null;
let editBuffer = {}; // temp storage during modal editing

// ======= LocalStorage helpers =======
function lsKey(docIdx, col) { return 'aipm_' + col + '_' + docIdx; }
function lsGet(docIdx, col) { const v = localStorage.getItem(lsKey(docIdx, col)); return v ? JSON.parse(v) : null; }
function lsSet(docIdx, col, val) { localStorage.setItem(lsKey(docIdx, col), JSON.stringify(val)); }

function getAttachments(docIdx) {
  const raw = localStorage.getItem('aipm_attach_' + docIdx);
  return raw ? JSON.parse(raw) : [];
}
function setAttachments(docIdx, list) {
  localStorage.setItem('aipm_attach_' + docIdx, JSON.stringify(list));
}

function getItems(docIdx, col) {
  const saved = lsGet(docIdx, col);
  return saved !== null ? saved : DOCS[docIdx][col];
}

// ======= Display name (strip prefix numbers) =======
function displayName(name) {
  return name.replace(/^\d{2}_/, '');
}

// ======= Escape HTML =======
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ======= Render =======
function render() {
  const tbody = document.getElementById('docBody');
  let html = '';
  let lastPhase = 0;

  DOCS.forEach((doc, idx) => {
    if (currentPhase !== 'all' && doc.phase !== parseInt(currentPhase)) return;

    if (doc.phase !== lastPhase) {
      lastPhase = doc.phase;
      const p = PHASES.find(pp => pp.id === doc.phase);
      html += '<tr class="phase-header" data-phase="' + doc.phase + '"><td colspan="7">' + p.name + '</td></tr>';
    }

    const rowClass = doc.highlight ? ' class="row-highlight"' : '';
    html += '<tr' + rowClass + ' data-idx="' + idx + '" data-phase="' + doc.phase + '">';

    // Col 1: Name (clean display, link to template)
    html += '<td style="font-weight:600"><a class="tpl-link" href="' + doc.tplFile + '" style="font-size:13px;font-weight:600">' + displayName(doc.name) + '</a></td>';

    // Col 2: Template file
    html += '<td><a class="tpl-link" href="' + doc.tplFile + '">' + doc.name.replace(/^\d{2}_/, '') + '.md</a></td>';

    // Col 3: Support materials
    const supports = getItems(idx, 'support');
    html += '<td>';
    supports.forEach(s => {
      html += '<span class="support-chip"><a href="' + escHtml(s.url) + '">' + escHtml(s.name) + '</a></span> ';
    });
    html += '</td>';

    // Col 4: Sites (show 3 + more)
    html += '<td>' + renderLinkList(idx, 'sites', 'site-link') + '</td>';

    // Col 5: Tools (show 3 + more)
    html += '<td>' + renderLinkList(idx, 'tools', 'tool-link') + '</td>';

    // Col 6: Models (sorted by tier)
    const models = getItems(idx, 'models').slice().sort((a,b) => a.tier - b.tier);
    html += '<td>';
    models.forEach(m => {
      const tierClass = 'model-tier-' + m.tier;
      const prefix = m.tier === 1 ? '\u2B50 ' : '';
      html += '<a class="model-badge ' + tierClass + '" href="' + escHtml(m.url) + '" target="_blank">' + prefix + escHtml(m.name) + '</a> ';
    });
    html += '</td>';

    // Col 7: Attachments (folder icon + count badge)
    const attachments = getAttachments(idx);
    html += '<td>';
    html += '<div class="attach-folder" onclick="openAttachPopup(event,' + idx + ')">';
    html += '<span style="font-size:16px">\uD83D\uDCC1</span>';
    if (attachments.length > 0) {
      html += '<span class="badge">' + attachments.length + '</span>';
    } else {
      html += '<span style="color:#bbb;font-size:12px">0</span>';
    }
    html += '</div>';
    html += '</td>';

    html += '</tr>';
  });

  tbody.innerHTML = html;
}

function renderLinkList(docIdx, col, linkClass) {
  const items = getItems(docIdx, col);
  const show = items.slice(0, 3);
  let html = '';
  show.forEach(item => {
    html += '<a class="' + linkClass + '" href="' + escHtml(item.url) + '" target="_blank">' + escHtml(item.name) + '</a><br>';
  });
  if (items.length > 3) {
    html += '<span class="more-btn" onclick="openMorePopup(event,' + docIdx + ',\'' + col + '\')">+' + (items.length - 3) + ' \u66F4\u591A</span>';
  }
  return html;
}

// ======= Phase Filter =======
document.getElementById('toolbar').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON' || !e.target.dataset.phase) return;
  document.querySelectorAll('#toolbar button[data-phase]').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentPhase = e.target.dataset.phase;
  render();
});

// ======= Popup System =======
function positionPopup(ev, box) {
  const rect = ev.target.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left;
  // Adjust if too close to edges
  if (left + 340 > window.innerWidth) left = window.innerWidth - 360;
  if (left < 10) left = 10;
  if (top + 360 > window.innerHeight) top = rect.top - 360;
  if (top < 10) top = 10;
  box.style.top = top + 'px';
  box.style.left = left + 'px';
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  document.getElementById('popupBox').style.display = 'none';
}

// ======= "More" Popup for Sites/Tools =======
function openMorePopup(ev, docIdx, col) {
  ev.stopPropagation();
  const items = getItems(docIdx, col);
  const title = col === 'sites' ? '\uD83C\uDF10 \u6570\u636E/\u62A5\u544A\u7F51\u7AD9' : '\uD83D\uDEE0\uFE0F \u63A8\u8350\u5DE5\u5177';
  const colorClass = col === 'sites' ? 'site-link' : 'tool-link';

  const box = document.getElementById('popupBox');
  let html = '<div class="popup-header"><h4>' + title + ' - ' + displayName(DOCS[docIdx].name) + '</h4><button class="popup-close" onclick="closePopup()">&times;</button></div>';
  html += '<div class="popup-body">';
  items.forEach(item => {
    html += '<div class="item-card"><a class="' + colorClass + '" href="' + escHtml(item.url) + '" target="_blank" style="font-size:13px">' + escHtml(item.name) + '</a><span style="font-size:11px;color:#aaa;margin-left:8px;flex-shrink:0">' + escHtml(item.url.replace(/^https?:\/\/(www\.)?/, '').split('/')[0]) + '</span></div>';
  });
  html += '</div>';

  box.innerHTML = html;
  box.style.display = 'flex';
  document.getElementById('popupOverlay').classList.add('show');
  positionPopup(ev, box);
}

// ======= Attachment Popup =======
function openAttachPopup(ev, docIdx) {
  ev.stopPropagation();
  const attachments = getAttachments(docIdx);

  const box = document.getElementById('popupBox');
  let html = '<div class="popup-header"><h4>\uD83D\uDCC1 \u9644\u4EF6 - ' + displayName(DOCS[docIdx].name) + '</h4><button class="popup-close" onclick="closePopup()">&times;</button></div>';
  html += '<div class="popup-body" id="attachPopupBody">';
  if (attachments.length === 0) {
    html += '<div style="text-align:center;color:#bbb;padding:20px;font-size:13px">\u6682\u65E0\u9644\u4EF6</div>';
  } else {
    attachments.forEach((fn, fi) => {
      html += '<div class="item-card"><a style="color:#555">' + escHtml(fn) + '</a><button class="del-btn" onclick="removeAttachFromPopup(' + docIdx + ',' + fi + ',event)" title="\u5220\u9664">&times;</button></div>';
    });
  }
  html += '</div>';
  html += '<div class="popup-footer"><div class="add-row">';
  html += '<input type="file" id="popupFileInput" multiple style="flex:1;font-size:12px;border:1px solid #ddd;border-radius:6px;padding:4px 8px" onchange="handlePopupFileSelect(event,' + docIdx + ')">';
  html += '</div></div>';

  box.innerHTML = html;
  box.style.display = 'flex';
  document.getElementById('popupOverlay').classList.add('show');
  positionPopup(ev, box);
}

function removeAttachFromPopup(docIdx, fileIdx, ev) {
  ev.stopPropagation();
  const list = getAttachments(docIdx);
  list.splice(fileIdx, 1);
  setAttachments(docIdx, list);
  render();
  // Refresh popup content
  const body = document.getElementById('attachPopupBody');
  if (body) {
    let html = '';
    const attachments = getAttachments(docIdx);
    if (attachments.length === 0) {
      html = '<div style="text-align:center;color:#bbb;padding:20px;font-size:13px">\u6682\u65E0\u9644\u4EF6</div>';
    } else {
      attachments.forEach((fn, fi) => {
        html += '<div class="item-card"><a style="color:#555">' + escHtml(fn) + '</a><button class="del-btn" onclick="removeAttachFromPopup(' + docIdx + ',' + fi + ',event)" title="\u5220\u9664">&times;</button></div>';
      });
    }
    body.innerHTML = html;
  }
  showToast('\u9644\u4EF6\u5DF2\u79FB\u9664');
}

function handlePopupFileSelect(ev, docIdx) {
  const files = ev.target.files;
  if (!files.length) return;
  const list = getAttachments(docIdx);
  for (let i = 0; i < files.length; i++) {
    if (!list.includes(files[i].name)) {
      list.push(files[i].name);
    }
  }
  setAttachments(docIdx, list);
  ev.target.value = '';
  render();
  // Refresh popup body
  const body = document.getElementById('attachPopupBody');
  if (body) {
    let html = '';
    list.forEach((fn, fi) => {
      html += '<div class="item-card"><a style="color:#555">' + escHtml(fn) + '</a><button class="del-btn" onclick="removeAttachFromPopup(' + docIdx + ',' + fi + ',event)" title="\u5220\u9664">&times;</button></div>';
    });
    body.innerHTML = html;
  }
  showToast('\u9644\u4EF6\u5DF2\u6DFB\u52A0');
}

// ======= Column Edit Modal =======
function openColModal(col) {
  currentEditCol = col;
  document.getElementById('colModalTitle').textContent = '\u7F16\u8F91\u5217: ' + COL_NAMES[col];
  const body = document.getElementById('colModalBody');

  // Deep copy current items into editBuffer
  editBuffer = {};
  DOCS.forEach((doc, idx) => {
    editBuffer[idx] = JSON.parse(JSON.stringify(getItems(idx, col)));
  });

  renderModalBody(col);
  document.getElementById('colModal').classList.add('show');
}

function renderModalBody(col) {
  const body = document.getElementById('colModalBody');
  let html = '';

  DOCS.forEach((doc, idx) => {
    const items = editBuffer[idx] || [];
    // Sort alphabetically
    items.sort((a,b) => a.name.localeCompare(b.name, 'zh-CN'));

    html += '<div class="modal-row">';
    html += '<div class="modal-row-label">' + displayName(doc.name) + '</div>';
    html += '<div class="modal-row-content">';

    // Render as chips
    html += '<div class="modal-item-chips">';
    items.forEach((item, i) => {
      if (col === 'models') {
        const tierLabel = item.tier === 1 ? '\u2B50\u6700\u63A8\u8350' : item.tier === 2 ? '\u9002\u7528' : '\u5907\u9009';
        html += '<span class="modal-chip"><a href="' + escHtml(item.url) + '" target="_blank">' + escHtml(item.name) + '</a><span style="font-size:10px;color:#999">(' + tierLabel + ')</span><button class="chip-del" onclick="removeModalItem(' + idx + ',' + i + ')">&times;</button></span>';
      } else {
        html += '<span class="modal-chip"><a href="' + escHtml(item.url) + '" target="_blank">' + escHtml(item.name) + '</a><button class="chip-del" onclick="removeModalItem(' + idx + ',' + i + ')">&times;</button></span>';
      }
    });
    html += '</div>';

    // Add row
    html += '<div class="modal-add-row">';
    html += '<input class="name-input" placeholder="\u540D\u79F0" id="addName_' + idx + '">';
    html += '<input class="url-input" placeholder="URL" id="addUrl_' + idx + '">';
    if (col === 'models') {
      html += '<select id="addTier_' + idx + '" style="padding:4px;border:1px solid #ddd;border-radius:4px;font-size:11px"><option value="1">\u2B50\u6700\u63A8\u8350</option><option value="2">\u9002\u7528</option><option value="3">\u5907\u9009</option></select>';
    }
    html += '<button onclick="addModalItem(' + idx + ')">\u6DFB\u52A0</button>';
    html += '</div>';

    html += '</div></div>';
  });

  body.innerHTML = html;
}

function removeModalItem(docIdx, itemIdx) {
  editBuffer[docIdx].splice(itemIdx, 1);
  renderModalBody(currentEditCol);
}

function addModalItem(docIdx) {
  const nameInput = document.getElementById('addName_' + docIdx);
  const urlInput = document.getElementById('addUrl_' + docIdx);
  const name = nameInput.value.trim();
  const url = urlInput.value.trim();
  if (!name) { nameInput.focus(); return; }

  const item = { name, url: url || '#' };
  if (currentEditCol === 'models') {
    const tierSelect = document.getElementById('addTier_' + docIdx);
    item.tier = parseInt(tierSelect.value);
  }

  editBuffer[docIdx].push(item);
  nameInput.value = '';
  urlInput.value = '';
  renderModalBody(currentEditCol);
}

function closeColModal() {
  document.getElementById('colModal').classList.remove('show');
  currentEditCol = null;
  editBuffer = {};
}

function saveColModal() {
  Object.keys(editBuffer).forEach(idx => {
    lsSet(parseInt(idx), currentEditCol, editBuffer[idx]);
  });
  closeColModal();
  render();
  showToast('\u5DF2\u4FDD\u5B58\u66F4\u6539');
}

// Close modal on overlay click
document.getElementById('colModal').addEventListener('click', e => {
  if (e.target === document.getElementById('colModal')) closeColModal();
});

// ======= Toast =======
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ======= Init =======
render();
</script>
</body>
</html>
